# runtime-bundle 发布链(spec D1-D6, 完整包 spec A7-A9)。job 顺序铁律: build 只产
# 完整包 artifact(源码树+runtime 合装, --source-ref)-> verify-linux 解包后在包内
# 跑 init+health, profile 走占位路径强制回退到包内 runtime bundle, 严格断言回退来源
# -> 全部验过 upload-release 才挂 Release —— 验证失败时 Release 上绝不能已经躺着
# 坏包(--clobber 会拿坏包覆盖好包)。
name: runtime-bundle

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z, 必须已在公开 main 快照链上)"
        required: true

# 同 tag 并发 dispatch 串行化(防竞态); cancel-in-progress 必须 false ——
# 绝不中断进行中的 release 上传(半传状态比排队更糟)。
concurrency:
  group: runtime-bundle-${{ inputs.tag }}
  cancel-in-progress: false

# 最小权限: 全 workflow 默认只读, 仅 upload-release job 单独升 contents:write
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}    # YAML 表达式, 非 shell 拼接(spec D5); tag 不存在则 checkout 直接 fail
          fetch-depth: 0            # ancestry 断言需要全历史 + origin/main

      # tag 合法性 + 快照链断言(fail-closed): tag 必须正则合法且是 origin/main(公开
      # 脱敏快照链)的祖先 —— 防止从私有历史 / 野分支出包外泄。
      # inputs 经 env 进 shell(不在 run 里内联 GitHub 表达式, 防 script injection)。
      - name: Validate tag & ancestry
        env:
          TAG: ${{ inputs.tag }}
        run: |
          echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?$' || { echo "bad tag: $TAG"; exit 1; }
          git fetch --tags origin main
          git merge-base --is-ancestor "$TAG^{commit}" origin/main || { echo "tag 不在公开快照链(origin/main)上"; exit 1; }

      # 供 license gate 与 java-indexer 的 mvn package(runner 自带 mvn)。
      # JDK 21 本地实测可编 vendor pom 的 source/target 1.8(shade fat jar 正常产出)。
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # license gate 前置于打包(fail-closed, spec A5): 任一依赖 license 不可再分发 /
      # Unknown / 报告格式漂移 -> exit 1 不出包。CI 未设 MVN_SETTINGS -> 走默认 settings
      # 直连 Maven Central(runner 干净, 无内网坏 mirror; 脚本该分支 = MVN_EXTRA 留空)。
      - name: License gate (fail-closed)
        run: ./scripts/check-indexer-licenses.sh

      # --source-ref "$TAG"(spec A7/A9): 只出完整包(源码树 + runtime 合装),
      # 命名 contextos-<TAG>-<platform>.tar.gz/zip, 顶层目录 contextos-<TAG>/,
      # 内含 runtime/contextos-runtime/。省略此参数则只出 runtime-only 包(旧行为),
      # 但 verify-linux 现在要在完整包内跑, 必须传。
      - name: Build 4 bundles
        env:
          TAG: ${{ inputs.tag }}
        run: ./scripts/build-runtime-bundle.sh --version "$TAG" --source-ref "$TAG" --out dist/

      # 只产 artifact, 不碰 Release(顺序铁律)
      - uses: actions/upload-artifact@v4
        with:
          name: bundles
          path: dist/*

      # license 审计归档(spec A5): THIRD-PARTY.txt 报告随 run 留档可查
      - uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: vendor/java-indexer/target/generated-sources/license/

  verify-linux:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # checkout 不再需要: verify 现在完全在解出的完整包内跑(包自含源码树 = build job
      # git archive 出的 SOURCE_SHA, 与本 job 若做 checkout 会拿到的树同源); 合成工程建在
      # /tmp/proj, uv sync/contextos 全部命令都 cd 进 $PKG_DIR 后执行, 不依赖本 job 的工作区
      # 有源码。留着 checkout 只会让"验的是包内代码"这条断言变得可疑(两份源码树, 万一漂移
      # 就分不清测的是哪份) —— 去掉。

      - uses: actions/download-artifact@v4
        with:
          name: bundles
          path: dist/

      # 本 job 无 checkout -> setup-uv 缓存 glob(默认 **/uv.lock)必落空, 会打
      # "No file matched..." warning: 预期且无害(只影响缓存 key; uv sync --frozen
      # 正确性来自包内 uv.lock), 不是故障。
      - uses: astral-sh/setup-uv@v5

      # 解完整包(spec A7/A9): build job 用 --source-ref 出的是 contextos-<TAG>/ 顶层目录,
      # 内含源码树 + runtime/contextos-runtime/ 合装。PKG_DIR 落 GITHUB_ENV 供后续步骤用
      # (每个 step 是独立 shell, 变量不跨 step 存活, 必须走 env 文件)。
      - name: Install rg + unpack full package
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep
          mkdir -p /tmp/pkg
          tar -xzf dist/contextos-*-linux-x64.tar.gz -C /tmp/pkg
          PKG_DIR="$(echo /tmp/pkg/contextos-*)"
          [ -d "$PKG_DIR" ] || { echo "包顶层目录缺失或多匹配: PKG_DIR=$PKG_DIR"; ls /tmp/pkg; exit 1; }
          [ ! -e "$PKG_DIR/.git" ] || { echo "包内不应有 .git(git archive 不应带 .git, 有则打包路径出错)"; exit 1; }
          echo "PKG_DIR=$PKG_DIR" >> "$GITHUB_ENV"
          # 早期 smoke: bundle JRE 可执行(比深链路里报错可读得多)
          "$PKG_DIR/runtime/contextos-runtime/jre/bin/java" -version

      # 合成工程 = Eclipse 工程形(.project/.classpath), JDT LS 原生离线导入。
      # 本地校准实测(mac, 同 bundle 布局):
      #   - 无 build 文件的裸目录: JDT 导入 0 符号 -> sanity 探活 0 -> init degraded(exit 1);
      #     gradle 形则要 Serena 另下 gradle 发行包(非 bundle 职责, CI 里又慢又脆)。
      #   - 单类 Hello: 软表空(code_fields/code_calls/code_inheritance)也 degraded。
      #   -> 两个类补齐 字段+调用+继承, 类名匹配 sanity 探活词前缀(Service/Util)。
      - name: Synthetic project + minimal profile
        run: |
          mkdir -p /tmp/proj/src/main/java/com/example
          cat > /tmp/proj/.project <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <projectDescription>
            <name>synthetic</name>
            <buildSpec>
              <buildCommand>
                <name>org.eclipse.jdt.core.javabuilder</name>
              </buildCommand>
            </buildSpec>
            <natures>
              <nature>org.eclipse.jdt.core.javanature</nature>
            </natures>
          </projectDescription>
          XML
          cat > /tmp/proj/.classpath <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <classpath>
            <classpathentry kind="src" path="src/main/java"/>
            <classpathentry kind="con" path="org.eclipse.jdt.launching.JRE_CONTAINER"/>
            <classpathentry kind="output" path="bin"/>
          </classpath>
          XML
          cat > /tmp/proj/src/main/java/com/example/Util.java <<'JAVA'
          package com.example;
          public class Util {
              protected String prefix = "hi ";
              public String greet(String n) { return prefix + n; }
          }
          JAVA
          cat > /tmp/proj/src/main/java/com/example/ServiceImpl.java <<'JAVA'
          package com.example;
          public class ServiceImpl extends Util {
              private Util delegate = new Util();
              public String run(String n) { return delegate.greet(n); }
          }
          JAVA
          # 最小合法 profile(全量键模板 = contextos/cli/tests/test_suggest_stop_keywords.py
          # 的 _write_min_profile, 本地实测 pydantic 合法), 写进包内 config/profile.toml
          # (verify 在包内跑, data_dir 也落包内 database/, 不碰本 job 工作区)。
          # [jdtls_runtime] 三路径改占位 + [code_index] 段整个删除(spec A7): 强制两边
          # 都判定"未配置有效值", resolve_effective_runtime 落到 runtime-bundle 回退分支,
          # 用包内 runtime/contextos-runtime/ 四件套(删段后缺省值指向 vendor/java-indexer/target/
          # 相对路径, 包里没有, 正是要验的回退触发条件)。
          # heredoc 不 quote 定界符: 要展开 $PKG_DIR 成绝对路径($RT 不再需要)。
          cat > "$PKG_DIR/config/profile.toml" <<TOML
          [llm]
          provider = "fake"
          api_key_env = "K"
          [embedding]
          model = "BAAI/bge-m3"
          [reranker]
          enabled = true
          model = "x"
          top_k_input = 50
          top_k_output = 10
          [query_expansion]
          enabled = true
          translation_provider = "main_llm"
          fallback_provider = "x"
          [storage]
          data_dir = "$PKG_DIR/database"
          [ingestion]
          default_cleanup = "full"
          chunk_strategy = "h2_h3"
          min_chunk_chars = 30
          [jdtls_runtime]
          jdtls_path = "/nonexistent/jdtls"
          lombok_path = "/nonexistent/lombok.jar"
          java_home = "/nonexistent/jre"
          [oracle]
          tns_admin = "/t"
          allowed_instances = ["TEST_DB1"]
          [code]
          source_roots = ["/tmp/proj"]
          [[projects]]
          name = "synthetic"
          path = "/tmp/proj"
          language = "java"
          build_system = "gradle"
          TOML

      # 真链路(spec A7/E5): profile 占位路径必判无效, 落到包内 runtime bundle 回退
      # (jdtls+jre+lombok+indexer 全走一遍 init), 再 health 严格断言回退来源。
      # init exit code 即闸门(ready=0 / degraded=1 / aborted=2), 任何降级都挡上传。
      - name: init + strict asserts inside package (spec A7/E5)
        run: |
          cd "$PKG_DIR"
          uv sync --frozen
          uv run contextos init --only code --skip-oracle
          uv run contextos health > /tmp/h.json
          python3 - <<'PY'
          import json, os, sqlite3
          h = json.load(open("/tmp/h.json"))["health"]
          jr = h["jdtls_runtime"]
          assert jr["status"] == "ok" and jr.get("source") == "runtime-bundle (fallback)", jr
          cp = h["code_projection"]
          assert cp["status"] == "ok" and cp.get("build_id"), cp
          db = sqlite3.connect(os.environ["PKG_DIR"] + "/database/contextos.db")
          for t in ("code_classes", "code_methods"):
              n = db.execute(f"select count(*) from {t}").fetchone()[0]
              assert n > 0, f"{t} empty"
          print("A7/E5 strict asserts OK")
          PY

  upload-release:
    needs: verify-linux             # 顺序铁律: 验过才挂 Release(HIGH-1)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write               # 只有这个 job 要写权限(最小权限)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bundles
          path: dist/

      # 前提: 用户已对该 tag 建好 Release(发布 runbook); 不存在则 gh 报错 fail-closed。
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}   # 本 job 无 checkout(裸目录), gh 推断不出目标仓, 必须显式
          TAG: ${{ inputs.tag }}
        run: |
          echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?$' || { echo "bad tag: $TAG"; exit 1; }
          gh release upload "$TAG" dist/* --clobber
